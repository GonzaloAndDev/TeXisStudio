<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>TeXisStudio — índigo + teal</title>

  <!-- Fondo app icon -->
  <rect width="1024" height="1024" rx="210" fill="#F0F0F8"/>
  <rect x="78" y="78" width="868" height="868" rx="190" fill="none" stroke="#C4C8E8" stroke-width="18"/>

  <filter id="bookShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#0A0A1A" flood-opacity="0.28"/>
  </filter>

  <g filter="url(#bookShadow)">
    <!-- Cuerpo del libro: índigo -->
    <path d="M288,194 H736 Q792,194 792,250 V788 Q792,844 736,844 H288 Q232,844 232,788 V250 Q232,194 288,194 Z" fill="#3D4E8A"/>

    <!-- Lomo izquierdo: navy oscuro -->
    <path d="M232 194 H360 V844 H232 Q198 844 198 810 V228 Q198 194 232 194 Z" fill="#252F5C" opacity="0.95"/>

    <!-- Reflejo sutil tapa derecha -->
    <path d="M392 194 H736 Q792 194 792 250 V500 H392 Z" fill="#4A5C9E" opacity="0.18"/>

    <!-- Páginas inferiores -->
    <path d="M256 786 H760 Q798 786 798 824 Q798 862 760 862 H256 Q218 862 218 824 Q218 786 256 786 Z" fill="#E8E8F4"/>
    <path d="M274 812 H752" stroke="#C4C8E8" stroke-width="10" stroke-linecap="round"/>
    <path d="M274 838 H712" stroke="#C4C8E8" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

    <!-- Marcapáginas: teal -->
    <path d="M470 846 V944 L526 900 L582 944 V846 Z" fill="#3AA396"/>

    <!-- Líneas portada: teal claro -->
    <path d="M388 312 H648" stroke="#6BCFC4" stroke-width="20" stroke-linecap="round" opacity="0.75"/>
    <path d="M424 380 H612" stroke="#6BCFC4" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

    <!-- Tipografía TxS -->
    <text x="512" y="610" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="230" font-weight="700" fill="#F0F0F8">TxS</text>

    <!-- e itálica en teal — acento TeXis -->
    <text x="434" y="658" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="92" font-style="italic" fill="#3AA396">e</text>
  </g>
</svg>
