schema_version: "0.1.0"
id: "generic.phd"
name: "Tesis de posgrado"
description: "Perfil para maestría y doctorado: revisión de literatura, estado del arte, planteamiento, experimentación, glosario y acrónimos. XeLaTeX, biber, APA 7."
author: "Gonzalo Andrade Estrella"
version: "0.1.0"
license: "AGPL-3.0"
tags:
  - tesis
  - maestria
  - doctorado
  - posgrado
  - apa
  - xelatex

document_class:
  name: "book"
  options:
    - "12pt"
    - "letterpaper"
    - "openany"

latex_engine: "xelatex"
compiler: "latexmk"
bibliography_backend: "biber"
bibliography_style: "apa"

packages:
  - "fontspec"
  - "geometry"
  - "graphicx"
  - "booktabs"
  - "csquotes"
  - "setspace"
  - "hyperref"
  - "listings"
  - "algorithm"
  - "algpseudocode"
  - "amsthm"

sections:
  # ── Portada y preliminares ──────────────────────────────────────
  - id: "title_page"
    element_id: "title_page"
    placement: "front_matter"
    required: true
    title: null

  - id: "table_of_contents"
    element_id: "table_of_contents"
    placement: "front_matter"
    required: true
    title: null

  - id: "list_of_figures"
    element_id: "list_of_figures"
    placement: "front_matter"
    required: false
    title: null

  - id: "list_of_tables"
    element_id: "list_of_tables"
    placement: "front_matter"
    required: false
    title: null

  - id: "list_of_algorithms"
    element_id: "list_of_algorithms"
    placement: "front_matter"
    required: false
    title: null

  - id: "acronyms"
    element_id: "acronyms"
    placement: "front_matter"
    required: false
    title: "Lista de Abreviaturas y Acrónimos"

  - id: "abstract_es"
    element_id: "abstract_es"
    placement: "front_matter"
    required: true
    title: "Resumen"

  - id: "abstract_en"
    element_id: "abstract_en"
    placement: "front_matter"
    required: true
    title: "Abstract"

  - id: "dedication"
    element_id: "dedication"
    placement: "front_matter"
    required: false
    title: "Dedicatoria"

  - id: "acknowledgements"
    element_id: "acknowledgements"
    placement: "front_matter"
    required: false
    title: "Agradecimientos"

  # ── Cuerpo principal ────────────────────────────────────────────
  - id: "introduction"
    element_id: "introduction"
    placement: "body"
    required: true
    title: "Introducción"
    label: "sec:introduccion"

  - id: "literature_review"
    element_id: "literature_review"
    placement: "body"
    required: true
    title: "Revisión de Literatura y Estado del Arte"
    label: "sec:literatura"

  - id: "theoretical_framework"
    element_id: "theoretical_framework"
    placement: "body"
    required: false
    title: "Marco Teórico"
    label: "sec:marco"

  - id: "problem_statement"
    element_id: "problem_statement"
    placement: "body"
    required: true
    title: "Planteamiento del Problema e Hipótesis"
    label: "sec:problema"

  - id: "methodology"
    element_id: "methodology"
    placement: "body"
    required: true
    title: "Metodología"
    label: "sec:metodologia"

  - id: "experimentation"
    element_id: "experimentation"
    placement: "body"
    required: false
    title: "Experimentación y Desarrollo"
    label: "sec:experimentacion"

  - id: "results"
    element_id: "results"
    placement: "body"
    required: true
    title: "Resultados"
    label: "sec:resultados"

  - id: "discussion"
    element_id: "discussion"
    placement: "body"
    required: true
    title: "Discusión"
    label: "sec:discusion"

  - id: "conclusions"
    element_id: "conclusions"
    placement: "body"
    required: true
    title: "Conclusiones y Trabajo Futuro"
    label: "sec:conclusiones"

  # ── Material final ──────────────────────────────────────────────
  - id: "references"
    element_id: "references"
    placement: "back_matter"
    required: true
    title: "Referencias"

  - id: "publications"
    element_id: "publications"
    placement: "back_matter"
    required: false
    title: "Publicaciones Derivadas"

  # ── Anexos ──────────────────────────────────────────────────────
  - id: "glossary"
    element_id: "glossary"
    placement: "appendix"
    required: false
    title: "Glosario"

  - id: "appendices"
    element_id: "appendices"
    placement: "appendix"
    required: false
    title: "Anexos"
