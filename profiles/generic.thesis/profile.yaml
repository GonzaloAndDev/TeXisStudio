schema_version: 1.0.0
id: generic.thesis
name: generic.thesis
author: Gonzalo Andrade Estrella
version: 1.0.0
license: AGPL-3.0
status: reviewed
verification:
  verified_at: '2026-05-24'
  verified_by: Gonzalo Andrade Estrella
  source_urls:
  - https://apastyle.apa.org/products/publication-manual-7th-edition
  - https://apastyle.apa.org/style-grammar-guidelines/paper-format/general-guidelines
  review_interval_days: 730
tags:
- tesis
- licenciatura
- especialidad
- maestria
- doctorado
- posdoctorado
- apa
- xelatex
document_class:
  name: book
  options:
  - 12pt
  - letterpaper
  - oneside
latex_engine: xelatex
compiler: latexmk
bibliography_backend: biber
bibliography_style: apa
packages:
- fontspec
- geometry
- graphicx
- booktabs
- csquotes
- setspace
- hyperref
title_page_template:
  template: "\\thispagestyle{empty}\n\\begin{titlepage}\n  \\centering\n  \\vspace*{1cm}\n  {\\scshape\\Large {{ institution_name | latex_escape }}\\par}\n  {% if faculty is defined and faculty %}\n  \\vspace{0.25cm}\n  {\\large {{ faculty | latex_escape }}\\par}\n  {% endif %}\n  {% if department is defined and department %}\n  \\vspace{0.15cm}\n  {\\normalsize {{ department | latex_escape }}\\par}\n  {% endif %}\n  \\vspace{1.4cm}\n  {\\huge\\bfseries {{ title | latex_escape }}\\par}\n  \\vspace{1.4cm}\n  {\\large {{ doc_kind_label }}\\par}\n  \\vspace{0.3cm}\n  {\\normalsize que para obtener el grado de\\par}\n  {\\normalsize\\bfseries {{ degree_label }}\\par}\n  \\vspace{1.2cm}\n  {\\normalsize Presenta:\\par}\n  \\vspace{0.3cm}\n  {\\large\\bfseries {{ author | latex_escape }}\\par}\n  \\vspace{1.2cm}\n  {% if advisors %}\n  {\\normalsize {{ advisor_label }}\\par}\n  \\vspace{0.25cm}\n  {% for a in advisors %}\n  {\\normalsize {{ a | latex_escape }}\\par}\n  {% endfor %}\n  \\vspace{0.5cm}\n\
    \  {% endif %}\n  \\vfill\n  {\\normalsize {{ city | latex_escape }}, {{ year }}\\par}\n\\end{titlepage}\n"
sections:
- id: title_page
  element_id: title_page
  placement: front_matter
  required: true
- id: table_of_contents
  element_id: table_of_contents
  placement: front_matter
  required: true
- id: abstract_es
  element_id: abstract_es
  placement: front_matter
  required: false
- id: abstract_en
  element_id: abstract_en
  placement: front_matter
  required: false
- id: dedication
  element_id: dedication
  placement: front_matter
  required: false
- id: acknowledgements
  element_id: acknowledgements
  placement: front_matter
  required: false
- id: introduction
  element_id: introduction
  placement: body
  required: true
  label: sec:introduccion
- id: theoretical_framework
  element_id: theoretical_framework
  placement: body
  required: false
  label: sec:marco
- id: methodology
  element_id: methodology
  placement: body
  required: true
  label: sec:metodologia
- id: results
  element_id: results
  placement: body
  required: true
  label: sec:resultados
- id: discussion
  element_id: discussion
  placement: body
  required: false
  label: sec:discusion
- id: conclusions
  element_id: conclusions
  placement: body
  required: true
  label: sec:conclusiones
- id: references
  element_id: references
  placement: back_matter
  required: true
- id: appendices
  element_id: appendices
  placement: appendix
  required: false
