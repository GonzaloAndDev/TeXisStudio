name: CI
on: [push, pull_request]

permissions:
  contents: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      INSTA_UPDATE: new
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      # En Linux (con deps Tauri instaladas) testamos todo el workspace.
      # En macOS/Windows solo texis-core y texis-cli para evitar problemas de linking de Tauri.
      - name: Unit tests (lib) — all workspace (Linux)
        if: runner.os == 'Linux'
        run: cargo test --workspace --lib

      - name: Unit tests (lib) — texis-core only (macOS/Windows)
        if: runner.os != 'Linux'
        run: cargo test --package texis-core --lib

      - name: Integration tests (snapshots + broken)
        run: cargo test --workspace --test snapshots --test broken

      - name: Checkout TeXisStudio-Profiles (para tests de perfiles)
        uses: actions/checkout@v4
        with:
          repository: GonzaloAndDev/TeXisStudio-Profiles
          path: texis-profiles
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration tests (perfiles institucionales)
        run: cargo test --workspace --test profiles
        env:
          TEXIS_PROFILES_PATH: ${{ github.workspace }}/texis-profiles
          TEXIS_INTERNAL_PROFILES_PATH: ${{ github.workspace }}/profiles

      - name: Accept new snapshots (CI only)
        run: cargo insta review --accept
        if: env.INSTA_UPDATE == 'new'
        continue-on-error: true

      - name: Generate and commit schema if missing or outdated (P0.3)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          cargo run --package texis-core --bin generate_schema
          SCHEMA_FILE=$(ls schemas/profile.v*.json 2>/dev/null | head -1)
          if [ -z "$SCHEMA_FILE" ]; then
            echo "ERROR: no se generó ningún schema"
            exit 1
          fi
          if ! git diff --quiet "$SCHEMA_FILE" 2>/dev/null || ! git ls-files --error-unmatch "$SCHEMA_FILE" 2>/dev/null; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add schemas/
            git commit -m "ci(schema): auto-generate profile schema (P0.3) [skip ci]"
            git pull --rebase origin main
            git push
            echo "Schema generado y commiteado automáticamente."
          else
            echo "Schema ya está actualizado."
          fi

      - name: Format check
        run: cargo fmt --all -- --check
        continue-on-error: true

      # Clippy: captura salida completa en artifact para diagnóstico sin bloquear CI.
      # Una vez identificados y corregidos todos los lints, remover continue-on-error.
      - name: Clippy (capture output)
        if: runner.os == 'Linux'
        run: |
          cargo clippy --workspace --message-format=json 2>&1 \
            | python3 -c "
import sys, json
lints = []
for line in sys.stdin:
    line=line.strip()
    if not line: continue
    try:
        msg=json.loads(line)
    except: continue
    if msg.get('reason') == 'compiler-message':
        m=msg.get('message',{})
        if m.get('level') in ('warning','error') and m.get('code'):
            spans=[s for s in m.get('spans',[]) if s.get('is_primary')]
            loc=f\"{spans[0]['file_name']}:{spans[0]['line_start']}\" if spans else '?'
            lints.append({'level': m['level'], 'code': m['code'].get('code','?'), 'msg': m['rendered'] or m['message'], 'loc': loc})
print(f'Total Clippy diagnostics: {len(lints)}')
for l in sorted(lints, key=lambda x: (x['level'],x['code'])):
    print(f\"  [{l['level'].upper()}] {l['code']} @ {l['loc']}\")
" > /tmp/clippy_report.txt 2>&1 || true
          cat /tmp/clippy_report.txt
          # Still run normally to capture exit code (informational)
          cargo clippy --workspace -- -D warnings 2>&1 | tail -5 || true
        continue-on-error: true

      - name: Upload Clippy report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: clippy_report
          path: /tmp/clippy_report.txt
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: texis-app

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: texis-app

      - name: Build frontend
        run: npm run build
        working-directory: texis-app
