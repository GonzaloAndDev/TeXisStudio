name: CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      INSTA_UPDATE: new
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      # En Linux (con deps Tauri instaladas) testamos todo el workspace.
      # En macOS/Windows solo texis-core y texis-cli para evitar problemas de linking de Tauri.
      - name: Unit tests (lib) — all workspace (Linux)
        if: runner.os == 'Linux'
        run: cargo test --workspace --lib

      - name: Unit tests (lib) — texis-core only (macOS/Windows)
        if: runner.os != 'Linux'
        run: cargo test --package texis-core --lib

      - name: Integration tests (snapshots + broken)
        run: cargo test --workspace --test snapshots --test broken

      - name: Checkout TeXisStudio-Profiles (para tests de perfiles)
        uses: actions/checkout@v4
        with:
          repository: GonzaloAndDev/TeXisStudio-Profiles
          path: texis-profiles
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration tests (perfiles institucionales)
        run: cargo test --workspace --test profiles
        env:
          TEXIS_PROFILES_PATH: ${{ github.workspace }}/texis-profiles
          TEXIS_INTERNAL_PROFILES_PATH: ${{ github.workspace }}/profiles

      - name: Accept new snapshots (CI only)
        run: cargo insta review --accept
        if: env.INSTA_UPDATE == 'new'
        continue-on-error: true

      - name: Generate schema and fail on drift (P0.3)
        if: runner.os == 'Linux'
        run: |
          cargo run --package texis-core --bin generate_schema
          SCHEMA_FILE=$(ls schemas/profile.v*.json 2>/dev/null | head -1)
          if [ -z "$SCHEMA_FILE" ]; then
            echo "ERROR: no se generó ningún schema"
            exit 1
          fi
          git ls-files --error-unmatch "$SCHEMA_FILE" >/dev/null 2>&1 || {
            echo "ERROR: el schema generado no está versionado en el repositorio."
            exit 1
          }
          git diff --quiet "$SCHEMA_FILE" || {
            echo "ERROR: el schema generado no coincide con el versionado. Ejecuta generate_schema y commitea el resultado."
            git diff -- "$SCHEMA_FILE"
            exit 1
          }
          echo "Schema verificado correctamente."

      - name: Format check
        run: cargo fmt --all -- --check
        continue-on-error: true

      # Clippy: continue-on-error mientras haya lints preexistentes sin corregir.
      # El output va a stderr/stdout del step — visible en el log del job.
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: texis-app

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: texis-app

      - name: Build frontend
        run: npm run build
        working-directory: texis-app
