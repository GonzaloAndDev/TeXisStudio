name: CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      # En Linux (con deps Tauri instaladas) testamos todo el workspace.
      # En macOS/Windows solo texis-core y texis-cli para evitar problemas de linking de Tauri.
      - name: Unit tests (lib) — all workspace (Linux)
        if: runner.os == 'Linux'
        run: cargo test --workspace --lib

      - name: Unit tests (lib) — texis-core only (macOS/Windows)
        if: runner.os != 'Linux'
        run: cargo test --package texis-core --lib

      - name: Integration tests (snapshots + broken)
        run: cargo test --workspace --test snapshots --test broken

      - name: Checkout TeXisStudio-Profiles (para tests de perfiles)
        uses: actions/checkout@v4
        with:
          repository: GonzaloAndDev/TeXisStudio-Profiles
          path: texis-profiles
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration tests (perfiles institucionales)
        run: cargo test --workspace --test profiles
        env:
          TEXIS_PROFILES_PATH: ${{ github.workspace }}/texis-profiles
          TEXIS_INTERNAL_PROFILES_PATH: ${{ github.workspace }}/profiles

      - name: Generate schema and fail on drift (P0.3)
        if: runner.os == 'Linux'
        run: |
          cargo run --package texis-core --bin generate_schema
          SCHEMA_FILE=$(ls schemas/profile.v*.json 2>/dev/null | head -1)
          if [ -z "$SCHEMA_FILE" ]; then
            echo "ERROR: no se generó ningún schema"
            exit 1
          fi
          git ls-files --error-unmatch "$SCHEMA_FILE" >/dev/null 2>&1 || {
            echo "ERROR: el schema generado no está versionado en el repositorio."
            exit 1
          }
          git diff --quiet "$SCHEMA_FILE" || {
            echo "ERROR: el schema generado no coincide con el versionado. Ejecuta generate_schema y commitea el resultado."
            git diff -- "$SCHEMA_FILE"
            exit 1
          }
          echo "Schema verificado correctamente."

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (gate duro — workspace completo en Linux)
        if: runner.os == 'Linux'
        run: cargo clippy --workspace -- -D warnings

      - name: Clippy (gate duro — core/cli en macOS/Windows)
        if: runner.os != 'Linux'
        run: cargo clippy --package texis-core --package texis-cli -- -D warnings

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: texis-app

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: texis-app

      - name: Build frontend
        run: npm run build
        working-directory: texis-app

  smoke-tectonic:
    name: Smoke — Tectonic backend
    runs-on: ubuntu-latest
    # Solo en main/master para no consumir minutos en PRs
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-tectonic-smoke-${{ hashFiles('**/Cargo.lock') }}

      - name: Build texis-cli (release)
        run: cargo build --release -p texis-cli

      - name: Install Tectonic
        run: |
          curl -fL https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.16.9/tectonic-0.16.9-x86_64-unknown-linux-gnu.tar.gz \
            -o tectonic.tar.gz
          tar xzf tectonic.tar.gz
          chmod +x tectonic
          sudo mv tectonic /usr/local/bin/tectonic
          tectonic --version

      - name: Checkout TeXisStudio-Profiles (sample project)
        uses: actions/checkout@v4
        with:
          repository: GonzaloAndDev/TeXisStudio-Profiles
          path: texis-profiles
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke compile — Tectonic backend (us_mit_ieee)
        run: |
          TEXIS=./target/release/texis
          SAMPLE=texis-profiles/profile_samples/us_mit_ieee/project.texis
          TEXIS_PROFILES_PATH=texis-profiles $TEXIS validate "$SAMPLE" || {
            echo "ERROR: validate failed"; exit 1; }
          TEXIS_PROFILES_PATH=texis-profiles $TEXIS compile "$SAMPLE" --backend tectonic || {
            echo "=== build log (last 40 lines) ==="
            cat "$SAMPLE/build/main.log" 2>/dev/null | tail -40 || echo "(no log)"
            exit 1; }
          [ -f "$SAMPLE/build/main.pdf" ] && echo "OK: Tectonic PDF generado" || {
            echo "ERROR: no PDF generado con Tectonic"; exit 1; }
