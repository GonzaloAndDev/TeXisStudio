name: CI
on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      INSTA_UPDATE: new
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Unit tests (lib)
        run: cargo test --workspace --lib

      - name: Integration tests (snapshots + broken)
        run: cargo test --workspace --test snapshots --test broken

      - name: Checkout TeXisStudio-Profiles (para tests de perfiles)
        uses: actions/checkout@v4
        with:
          repository: GonzaloAndDev/TeXisStudio-Profiles
          path: texis-profiles
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration tests (perfiles institucionales)
        run: cargo test --workspace --test profiles
        env:
          TEXIS_PROFILES_PATH: ${{ github.workspace }}/texis-profiles
          TEXIS_INTERNAL_PROFILES_PATH: ${{ github.workspace }}/profiles

      - name: Accept new snapshots (CI only)
        run: cargo insta review --accept
        if: env.INSTA_UPDATE == 'new'
        continue-on-error: true

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: texis-app

      - name: Build frontend
        run: npm run build
        working-directory: texis-app
