name: CI
on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      INSTA_UPDATE: new
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      # En Linux (con deps Tauri instaladas) testamos todo el workspace.
      # En macOS/Windows solo texis-core y texis-cli para evitar problemas de linking de Tauri.
      - name: Unit tests (lib) — all workspace (Linux)
        if: runner.os == 'Linux'
        run: cargo test --workspace --lib

      - name: Unit tests (lib) — texis-core only (macOS/Windows)
        if: runner.os != 'Linux'
        run: cargo test --package texis-core --lib

      - name: Integration tests (snapshots + broken)
        run: cargo test --workspace --test snapshots --test broken

      - name: Checkout TeXisStudio-Profiles (para tests de perfiles)
        uses: actions/checkout@v4
        with:
          repository: GonzaloAndDev/TeXisStudio-Profiles
          path: texis-profiles
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration tests (perfiles institucionales)
        run: cargo test --workspace --test profiles
        env:
          TEXIS_PROFILES_PATH: ${{ github.workspace }}/texis-profiles
          TEXIS_INTERNAL_PROFILES_PATH: ${{ github.workspace }}/profiles

      - name: Accept new snapshots (CI only)
        run: cargo insta review --accept
        if: env.INSTA_UPDATE == 'new'
        continue-on-error: true

      - name: Generate and commit schema if missing or outdated (P0.3)
        if: runner.os == 'Linux'
        run: |
          cargo run --package texis-core --bin generate_schema
          if ! git diff --quiet schemas/profile.v1.0.0.json 2>/dev/null || ! git ls-files --error-unmatch schemas/profile.v1.0.0.json 2>/dev/null; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add schemas/profile.v1.0.0.json
            git commit -m "ci(schema): auto-generate profile.v1.0.0.json (P0.3) [skip ci]"
            git push
            echo "Schema generado y commiteado automáticamente."
          else
            echo "Schema ya está actualizado."
          fi

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: texis-app

      - name: Build frontend
        run: npm run build
        working-directory: texis-app
